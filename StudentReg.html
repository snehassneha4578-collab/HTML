
<!DOCTYPE html>

<html>

<head>

<title>Input Types</title>

</head>

<body>

<h1>Student Registration</h1>

<form>

<label>Name:</label>

<input type="text"
placeholder="Enter your name"
required>

<br><br>

<label>Password:</label>

<input type="password">

<br><br>

<label>Email:</label>

<input type="email">

<br><br>

<label>Age:</label>

<input type="number">

<br><br>

<label>Date of Birth:</label>

<input type="date">

<br><br>

<label>Upload Resume:</label>

<input type="file">

<br><br>

<input type="submit"
value="Register">

<input type="reset">

</form>

</body>

</html>
