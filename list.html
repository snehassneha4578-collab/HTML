<!DOCTYPE html>

<html>

<head>

<title>HTML Lists</title>

</head>

<body>

<h1>Ordered List</h1>

<ol type="A">

<li>C</li>

<li>C++</li>

<li>Python</li>

</ol>

<h1>Unordered List</h1>

<ul type="square">

<li>Apple</li>

<li>Mango</li>

<li>Orange</li>

</ul>

<h1>Description List</h1>

<dl>

<dt>HTML</dt>

<dd>HyperText Markup Language</dd>

<dt>CSS</dt>

<dd>Cascading Style Sheets</dd>

</dl>

</body>

</html>
